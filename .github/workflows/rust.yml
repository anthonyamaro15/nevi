name: Rust CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libssl-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            pkg-config \
            zlib1g-dev

      - name: Select stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --quiet

      - name: Run render frame-budget guard
        run: cargo test render_frame_budget -- --ignored --nocapture

      - name: Install pinned Neovim for parity smoke test
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.3

      - name: Report Neovim oracle version
        run: nvim --version

      - name: Run Vim oracle smoke test
        run: NEVI_VIM_ORACLE=1 cargo test vim_oracle_smoke -- --ignored --nocapture

      - name: Build release binary
        run: cargo build --release --quiet

      - name: Report release binary size
        run: du -sh target/release/nevi
